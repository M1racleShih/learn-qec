<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="800" viewBox="0 0 1500 800">
  <defs>
    <style>
      .title { font: 700 31px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #222; }
      .subtitle { font: 18px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #555; }
      .panel-title { font: 700 24px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #222; }
      .label { font: 700 19px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #333; }
      .small { font: 16px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #555; }
      .purple { fill: #7047a3; }
      .red { fill: #b64342; }
      .blue { fill: #0f4d92; }
      .purple-ring { fill: white; stroke: #7047a3; stroke-width: 6; }
      .fault-ring { fill: white; stroke: #b64342; stroke-width: 4; }
      .logical-string { fill: none; stroke: #7047a3; stroke-width: 8; stroke-linecap: round; }
      .time-chain { fill: none; stroke: #b64342; stroke-width: 5; stroke-dasharray: 10 7; }
      .axis { fill: none; stroke: #555; stroke-width: 4; }
      .bracket { fill: none; stroke: #7047a3; stroke-width: 5; stroke-dasharray: 10 7; }
      .divider { stroke: #d2d2d2; stroke-width: 2; }
      .box { fill: #f7f7f7; stroke: #d2d2d2; stroke-width: 1.5; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <rect width="1500" height="800" fill="white"/>
  <text x="750" y="46" text-anchor="middle" class="title">为什么一个论文 time step 通常需要约 d 轮 code cycles？</text>
  <text x="750" y="78" text-anchor="middle" class="subtitle">要让时间方向的保护长度，不成为比空间方向更短的弱点</text>

  <line x1="540" y1="110" x2="540" y2="625" class="divider"/>

  <!-- Panel A: spatial distance -->
  <text x="280" y="125" text-anchor="middle" class="panel-title">A. 空间方向：code distance d = 5</text>
  <image href="paper-fig37-one-tile-patch-base.png"
         x="80" y="160" width="400" height="406"
         preserveAspectRatio="none" image-rendering="auto"/>

  <line x1="127" y1="204" x2="127" y2="519" class="logical-string"/>
  <g>
    <circle cx="127" cy="204" r="22" class="purple-ring"/>
    <circle cx="127" cy="284" r="22" class="purple-ring"/>
    <circle cx="127" cy="363" r="22" class="purple-ring"/>
    <circle cx="127" cy="439" r="22" class="purple-ring"/>
    <circle cx="127" cy="519" r="22" class="purple-ring"/>
    <text x="127" y="211" text-anchor="middle" class="label purple">X</text>
    <text x="127" y="291" text-anchor="middle" class="label purple">X</text>
    <text x="127" y="370" text-anchor="middle" class="label purple">X</text>
    <text x="127" y="446" text-anchor="middle" class="label purple">X</text>
    <text x="127" y="526" text-anchor="middle" class="label purple">X</text>
  </g>
  <path d="M 55 200 L 35 200 L 35 523 L 55 523" class="bracket"/>
  <text x="20" y="365" text-anchor="middle" class="label purple" transform="rotate(-90 20 365)">5 个 data qubits</text>
  <text x="280" y="600" text-anchor="middle" class="label purple">最短 spatial logical string 长度是 d</text>

  <!-- Panel B: temporal depth -->
  <text x="1020" y="125" text-anchor="middle" class="panel-title">B. 时间方向：重复约 d = 5 个 code cycles</text>
  <text x="1020" y="155" text-anchor="middle" class="small">同一 stabilizer 在连续轮次中的 measurement history</text>

  <!-- Five exact miniature patch copies -->
  <g>
    <text x="640" y="205" text-anchor="middle" class="small">cycle 1</text>
    <image href="paper-fig37-one-tile-patch-base.png"
           x="572" y="220" width="136" height="138"
           preserveAspectRatio="none" image-rendering="auto"/>
    <circle cx="681" cy="249" r="15" class="fault-ring"/>
    <text x="681" y="255" text-anchor="middle" class="label red">M</text>

    <text x="820" y="205" text-anchor="middle" class="small">cycle 2</text>
    <image href="paper-fig37-one-tile-patch-base.png"
           x="752" y="220" width="136" height="138"
           preserveAspectRatio="none" image-rendering="auto"/>
    <circle cx="861" cy="249" r="15" class="fault-ring"/>
    <text x="861" y="255" text-anchor="middle" class="label red">M</text>

    <text x="1000" y="205" text-anchor="middle" class="small">cycle 3</text>
    <image href="paper-fig37-one-tile-patch-base.png"
           x="932" y="220" width="136" height="138"
           preserveAspectRatio="none" image-rendering="auto"/>
    <circle cx="1041" cy="249" r="15" class="fault-ring"/>
    <text x="1041" y="255" text-anchor="middle" class="label red">M</text>

    <text x="1180" y="205" text-anchor="middle" class="small">cycle 4</text>
    <image href="paper-fig37-one-tile-patch-base.png"
           x="1112" y="220" width="136" height="138"
           preserveAspectRatio="none" image-rendering="auto"/>
    <circle cx="1221" cy="249" r="15" class="fault-ring"/>
    <text x="1221" y="255" text-anchor="middle" class="label red">M</text>

    <text x="1360" y="205" text-anchor="middle" class="small">cycle 5</text>
    <image href="paper-fig37-one-tile-patch-base.png"
           x="1292" y="220" width="136" height="138"
           preserveAspectRatio="none" image-rendering="auto"/>
    <circle cx="1401" cy="249" r="15" class="fault-ring"/>
    <text x="1401" y="255" text-anchor="middle" class="label red">M</text>
  </g>

  <!-- Schematic time-like fault chain -->
  <line x1="681" y1="249" x2="1401" y2="249" class="time-chain"/>
  <text x="1041" y="397" text-anchor="middle" class="small red">M：示意该 stabilizer 在这一轮发生 measurement fault</text>
  <text x="1041" y="428" text-anchor="middle" class="label red">连续 faults 可形成 time-like error chain</text>

  <line x1="630" y1="485" x2="1410" y2="485" class="axis" marker-end="url(#arrow)"/>
  <text x="1020" y="520" text-anchor="middle" class="label">time：5 个 code cycles</text>

  <rect x="640" y="545" width="760" height="72" rx="10" fill="#eef4fa" stroke="#aac4dd"/>
  <text x="1020" y="575" text-anchor="middle" class="label blue">测量约 d 轮，使 time-like failure 的长度也随 d 增长</text>
  <text x="1020" y="603" text-anchor="middle" class="small">实际 circuit fault path 可能更复杂；这里仅画最小心智模型</text>

  <!-- Summary -->
  <rect x="55" y="655" width="1390" height="98" rx="12" class="box"/>
  <text x="90" y="692" class="small">
    若操作只持续很少几轮，时间方向会比宽度为 d 的空间方向更容易被 measurement faults 穿透。
  </text>
  <text x="90" y="730" class="label">
    因此 fault-tolerant surface-code operation 通常持续约 d 轮 code cycles；论文把这种随 d 增长的时长记作 1 time step。
  </text>
</svg>
