<svg xmlns="http://www.w3.org/2000/svg" width="1750" height="820" viewBox="0 0 1750 820">
  <defs>
    <style>
      .title { font: 700 31px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #222; }
      .subtitle { font: 18px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #555; }
      .panel-title { font: 700 24px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #222; }
      .label { font: 700 19px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #333; }
      .small { font: 16px "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; fill: #555; }
      .red { fill: #b64342; }
      .blue { fill: #0f4d92; }
      .green { fill: #317a49; }
      .event-ring { fill: none; stroke: #b64342; stroke-width: 8; }
      .blue-ring { fill: white; stroke: #0f4d92; stroke-width: 6; }
      .green-ring { fill: white; stroke: #317a49; stroke-width: 6; }
      .actual-path { fill: none; stroke: #b64342; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
      .recovery-path { fill: none; stroke: #0f4d92; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
      .closed-loop { fill: none; stroke: #317a49; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .flow { fill: none; stroke: #555; stroke-width: 5; }
      .legend { fill: #f7f7f7; stroke: #d2d2d2; stroke-width: 1.5; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <rect width="1750" height="820" fill="white"/>
  <text x="875" y="46" text-anchor="middle" class="title">Decoder 没猜中真实 path，也可能成功 recovery</text>
  <text x="875" y="78" text-anchor="middle" class="subtitle">假设每个 data error 同样罕见；示例只讨论 spatial X-error chain</text>

  <!-- Panel A: actual error -->
  <text x="240" y="125" text-anchor="middle" class="panel-title">A. 真实 5-error chain（红）</text>
  <image href="paper-fig37-one-tile-patch-base.png"
         x="40" y="150" width="400" height="406"
         preserveAspectRatio="none" image-rendering="auto"/>
  <circle cx="361" cy="235" r="31" class="event-ring"/>
  <circle cx="125" cy="471" r="31" class="event-ring"/>

  <polyline points="361,235 319,274 281,314 243,274 203,234 164,274 125,314 164,353 203,391 164,429 125,471"
            class="actual-path"/>
  <g stroke="white" stroke-width="13" stroke-linecap="round">
    <line x1="307" y1="262" x2="331" y2="286"/>
    <line x1="331" y1="262" x2="307" y2="286"/>
    <line x1="231" y1="262" x2="255" y2="286"/>
    <line x1="255" y1="262" x2="231" y2="286"/>
    <line x1="152" y1="262" x2="176" y2="286"/>
    <line x1="176" y1="262" x2="152" y2="286"/>
    <line x1="152" y1="341" x2="176" y2="365"/>
    <line x1="176" y1="341" x2="152" y2="365"/>
    <line x1="152" y1="417" x2="176" y2="441"/>
    <line x1="176" y1="417" x2="152" y2="441"/>
  </g>
  <g stroke="#b64342" stroke-width="8" stroke-linecap="round">
    <line x1="307" y1="262" x2="331" y2="286"/>
    <line x1="331" y1="262" x2="307" y2="286"/>
    <line x1="231" y1="262" x2="255" y2="286"/>
    <line x1="255" y1="262" x2="231" y2="286"/>
    <line x1="152" y1="262" x2="176" y2="286"/>
    <line x1="176" y1="262" x2="152" y2="286"/>
    <line x1="152" y1="341" x2="176" y2="365"/>
    <line x1="176" y1="341" x2="152" y2="365"/>
    <line x1="152" y1="417" x2="176" y2="441"/>
    <line x1="176" y1="417" x2="152" y2="441"/>
  </g>
  <text x="240" y="590" text-anchor="middle" class="label red">真实偶然发生了 5 个 physical X errors</text>

  <!-- Flow -->
  <path d="M 475 350 L 610 350" class="flow" marker-end="url(#arrow)"/>
  <text x="542" y="327" text-anchor="middle" class="small">decoder 只见端点</text>

  <!-- Panel B: different recovery -->
  <text x="875" y="125" text-anchor="middle" class="panel-title">B. decoder 选择 3-error 短路（蓝）</text>
  <image href="paper-fig37-one-tile-patch-base.png"
         x="675" y="150" width="400" height="406"
         preserveAspectRatio="none" image-rendering="auto"/>
  <circle cx="996" cy="235" r="31" class="event-ring"/>
  <circle cx="760" cy="471" r="31" class="event-ring"/>

  <!-- Short route alternating through check centers and selected shared data vertices -->
  <polyline points="996,235 954,274 916,314 878,353 838,391 799,429 760,471"
            class="recovery-path"/>
  <g>
    <circle cx="954" cy="274" r="21" class="blue-ring"/>
    <circle cx="878" cy="353" r="21" class="blue-ring"/>
    <circle cx="799" cy="429" r="21" class="blue-ring"/>
    <text x="954" y="281" text-anchor="middle" class="label blue">X</text>
    <text x="878" y="360" text-anchor="middle" class="label blue">X</text>
    <text x="799" y="436" text-anchor="middle" class="label blue">X</text>
  </g>
  <text x="875" y="590" text-anchor="middle" class="label blue">短 path 更可能，也连接同样的两个端点</text>

  <!-- Flow -->
  <path d="M 1110 350 L 1245 350" class="flow" marker-end="url(#arrow)"/>
  <text x="1177" y="315" text-anchor="middle" class="small">合并真实 error</text>
  <text x="1177" y="337" text-anchor="middle" class="small">与 recovery</text>

  <!-- Panel C: combined closed loop -->
  <text x="1510" y="125" text-anchor="middle" class="panel-title">C. 剩下一个局部闭环（绿）</text>
  <image href="paper-fig37-one-tile-patch-base.png"
         x="1310" y="150" width="400" height="406"
         preserveAspectRatio="none" image-rendering="auto"/>

  <!-- Four remaining X operators around one dark X-stabilizer face -->
  <polyline points="1434,274 1513,274 1513,353 1434,353 1434,274" class="closed-loop"/>
  <g>
    <circle cx="1434" cy="274" r="21" class="green-ring"/>
    <circle cx="1513" cy="274" r="21" class="green-ring"/>
    <circle cx="1513" cy="353" r="21" class="green-ring"/>
    <circle cx="1434" cy="353" r="21" class="green-ring"/>
    <text x="1434" y="281" text-anchor="middle" class="label green">X</text>
    <text x="1513" y="281" text-anchor="middle" class="label green">X</text>
    <text x="1513" y="360" text-anchor="middle" class="label green">X</text>
    <text x="1434" y="360" text-anchor="middle" class="label green">X</text>
  </g>
  <text x="1510" y="590" text-anchor="middle" class="label green">闭环正好是一个局部 X-type stabilizer</text>

  <!-- Explanation -->
  <rect x="55" y="635" width="1640" height="135" rx="12" class="legend"/>
  <text x="90" y="676" class="small">
    红、蓝 path 共有的两个 data-qubit 位置各出现两次 X，因此抵消。
  </text>
  <text x="90" y="712" class="small">
    剩下四个 X 位于同一个深色 face 的四个角，正是该 X-type stabilizer 的作用范围。
  </text>
  <text x="90" y="748" class="label green">
    这个局部 stabilizer 不改变 logical information，所以 recovery 仍然成功。
  </text>
</svg>
