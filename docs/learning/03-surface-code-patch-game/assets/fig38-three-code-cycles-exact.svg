<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1500 590" role="img" aria-labelledby="title desc">
  <title id="title">三个 code cycles 是同一 check map 重复三次</title>
  <desc id="desc">将论文 Figure 38 的左侧 check map 保持原始比例并排显示三次，不添加额外圈选或状态移动箭头。</desc>
  <defs>
    <style>
      text { font-family: "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #172033; }
      .title { font-size: 29px; font-weight: 700; }
      .subtitle { font-size: 16px; fill: #526079; }
      .cycle { font-size: 20px; font-weight: 700; }
      .body { font-size: 16px; }
    </style>
  </defs>
  <rect width="1500" height="590" fill="#f7f9fc"/>
  <text x="750" y="44" text-anchor="middle" class="title">3 code cycles = 同一张 check map 完整执行 3 次</text>
  <text x="750" y="72" text-anchor="middle" class="subtitle">不是测三种不同的东西；每一栏都测左图中完全相同的 24 个 face checks</text>

  <text x="265" y="111" text-anchor="middle" class="cycle">cycle 1</text>
  <text x="750" y="111" text-anchor="middle" class="cycle">cycle 2</text>
  <text x="1235" y="111" text-anchor="middle" class="cycle">cycle 3</text>

  <rect x="69" y="126" width="392" height="394" rx="15" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <svg x="75" y="132" width="380" height="382" viewBox="6 42 283 284" preserveAspectRatio="xMidYMid meet">
    <image xlink:href="fig38-original.jpg" x="0" y="0" width="671" height="326"/>
  </svg>

  <text x="508" y="339" text-anchor="middle" font-size="42" font-weight="700" fill="#64748b">=</text>

  <rect x="554" y="126" width="392" height="394" rx="15" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <svg x="560" y="132" width="380" height="382" viewBox="6 42 283 284" preserveAspectRatio="xMidYMid meet">
    <image xlink:href="fig38-original.jpg" x="0" y="0" width="671" height="326"/>
  </svg>

  <text x="993" y="339" text-anchor="middle" font-size="42" font-weight="700" fill="#64748b">=</text>

  <rect x="1039" y="126" width="392" height="394" rx="15" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <svg x="1045" y="132" width="380" height="382" viewBox="6 42 283 284" preserveAspectRatio="xMidYMid meet">
    <image xlink:href="fig38-original.jpg" x="0" y="0" width="671" height="326"/>
  </svg>

  <rect x="272" y="535" width="956" height="38" rx="19" fill="#e6fffb" stroke="#0f766e" stroke-width="2"/>
  <text x="750" y="560" text-anchor="middle" class="body" font-weight="700" fill="#0f766e">每轮得到 24 个 ±1；三轮提供三张时间快照，用来寻找结果随时间发生的变化</text>
</svg>
